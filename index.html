<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivo · Catálogo de descargas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0d1117;
    --bg-panel: #161b22;
    --paper: #f4f1e1;
    --paper-line: rgba(0, 0, 0, 0.08);
    --text-dark: #1f2328;
    --text-mute: #59636e;
    --stamp-red: #d1242f;
    --brass: #d2a850;
    --teal: #238636;
    --focus: #d2a850;
    --border-subtle: rgba(255, 255, 255, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  body {
    background-color: var(--bg-dark);
    background-image: 
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    color: var(--paper);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  a { color: inherit; text-decoration: none; }

  .wrap { max-width: 1080px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 24px;
    padding-bottom: 24px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .tab {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--brass);
    color: var(--bg-dark);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    padding: 6px 12px;
    border-radius: 4px;
    margin-bottom: 16px;
    box-shadow: 0 0 15px rgba(210, 168, 80, 0.2);
  }

  h1 {
    font-family: 'Special Elite', cursive;
    font-weight: 400;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    letter-spacing: -0.02em;
    color: #ffffff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  header p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    margin-top: 8px;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(22, 27, 34, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    padding: 12px 18px;
    min-width: 280px;
    transition: all 0.3s ease;
  }

  .search-box:focus-within {
    border-color: var(--brass);
    box-shadow: 0 0 0 3px rgba(210, 168, 80, 0.15);
    background: var(--bg-panel);
  }

  .search-box svg { flex-shrink: 0; color: var(--brass); opacity: 0.8; }
  .search-box input {
    background: none; border: none; outline: none;
    color: #fff; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem; width: 100%;
  }
  .search-box input::placeholder { color: rgba(255,255,255,0.3); }

  .filters {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 30px;
  }

  .filter-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
    font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle);
    color: rgba(255,255,255,0.6); padding: 8px 20px; border-radius: 999px;
    cursor: pointer; transition: all 0.2s ease;
  }
  .filter-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; background: rgba(255,255,255,0.08); }
  .filter-btn.active { background: #fff; border-color: #fff; color: var(--bg-dark); box-shadow: 0 4px 12px rgba(255,255,255,0.15); }

  /* =========================================
     SISTEMA DE CARPETAS (ACORDEÓN)
     ========================================= */
  .folder-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .folder {
    background: var(--bg-panel);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    overflow: hidden;
  }

  .folder-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    transition: background 0.2s ease;
    user-select: none;
  }

  .folder-header:hover { background: rgba(255,255,255,0.05); }

  .folder-title-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .folder-title-group svg { color: var(--brass); }

  .folder-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.05rem;
    font-weight: 600;
    color: #fff;
  }

  .folder-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-mute);
  }

  .chevron {
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .folder.open .chevron { transform: rotate(180deg); }
  .folder.open .folder-header { border-bottom: 1px solid var(--border-subtle); background: rgba(210, 168, 80, 0.05); }

  /* Truco CSS para animar la altura del acordeón suavemente */
  .folder-content-wrapper {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .folder.open .folder-content-wrapper { grid-template-rows: 1fr; }

  .folder-content-inner {
    overflow: hidden;
  }

  /* Grid interna de las tarjetas */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
    padding: 24px 20px;
  }

  /* =========================================
     TARJETAS (CARDS)
     ========================================= */
  .card {
    position: relative; background: var(--paper); color: var(--text-dark);
    border-radius: 6px; padding: 24px 20px 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 12px 24px rgba(0,0,0,0.2), inset 0 0 60px rgba(0,0,0,0.03);
    background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 27px, var(--paper-line) 28px);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-6px) scale(1.01); box-shadow: 0 8px 15px rgba(0,0,0,0.1), 0 24px 40px rgba(0,0,0,0.4), inset 0 0 60px rgba(0,0,0,0.03); z-index: 2; }

  .stamp {
    position: absolute; top: 12px; right: -8px; font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em;
    color: var(--stamp-red); border: 2px dashed var(--stamp-red); border-radius: 4px; padding: 3px 8px; transform: rotate(12deg); opacity: 0.7; mix-blend-mode: multiply; pointer-events: none;
  }
  .stamp.doc { color: var(--teal); border-color: var(--teal); transform: rotate(-8deg); }

  .card h2 { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 600; line-height: 1.3; padding-right: 50px; margin-bottom: 12px; word-break: break-word; color: #111; }
  .meta { display: flex; gap: 12px; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--text-mute); margin-bottom: 14px; font-weight: 500; }
  .meta span { display: flex; align-items: center; gap: 4px; }
  .meta svg { width: 14px; height: 14px; opacity: 0.7; }
  .desc { font-size: 0.85rem; line-height: 1.6; color: #333; margin-bottom: 20px; flex-grow: 1; }

  .preview { margin-bottom: 16px; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: 1px solid rgba(0,0,0,0.1); }
  .thumb { width: 100%; height: 140px; object-fit: cover; background: #000; display: block; transition: transform 0.3s ease; }
  .card:hover .thumb { transform: scale(1.03); }

  .btn-download {
    display: inline-flex; justify-content: center; align-items: center; gap: 8px; background: var(--bg-dark); color: var(--paper); font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; font-weight: 600; padding: 10px 16px; border-radius: 6px; transition: all 0.2s ease; width: 100%; border: 1px solid transparent;
  }
  .btn-download:hover { background: var(--brass); color: var(--bg-dark); box-shadow: 0 4px 12px rgba(210, 168, 80, 0.3); }

  .empty { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.4); font-family: 'IBM Plex Mono', monospace; font-size: 0.95rem; background: rgba(255,255,255,0.02); border: 1px dashed var(--border-subtle); border-radius: 8px; }

  footer { margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--border-subtle); font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: rgba(255,255,255,0.4); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  footer span:last-child { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 4px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <span class="tab">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        CAJÓN 01
      </span>
      <h1>Archivo Central</h1>
      <p id="count-label">— archivos disponibles</p>
    </div>
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input id="search" type="text" placeholder="Buscar por nombre, descripción..." aria-label="Buscar archivo">
    </div>
  </header>

  <div class="filters" id="filters"></div>

  <div class="folder-container" id="folders-container"></div>

  <div class="empty" id="empty" hidden>
    <svg width="40" height="40" style="margin-bottom:12px; opacity:0.5;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="9" y1="14" x2="15" y2="14"></line></svg>
    <br>No hay archivos que coincidan con tu búsqueda.
  </div>

  <footer>
    <span>Última actualización: <span id="updated" style="color:var(--brass);"></span></span>
    <span>Catálogo estático · Seguro & Privado</span>
  </footer>
</div>

<script>
  /* =====================================================================
     CÓMO USAR LAS CARPETAS:
     Solo tienes que añadir la propiedad 'folder: "Nombre de tu Carpeta"' 
     a cada archivo. El sistema se encarga de agruparlos visualmente.
     ===================================================================== */

  const FILES = [
    {
      name: "[Daemon Hentai] GeeWhy Collection [Akira].mp4",
      folder: "Colección GeeWhy", // <--- AQUÍ DEFINES LA CARPETA
      category: "video",
      size: "209 MB",
      date: "2026-07-07",
      desc: "Colección de videos clasificados de GeeWhy. Material restringido.",
      url: "https://drive.google.com/uc?export=download&id=1hYpMZsdORtzPZ98b76t_zETTxHFucgWJ"
    },
    {
      name: "[Totonito] Alya X Yuki Parte 1.mp4",
      folder: "Alya X Yuki",
      category: "video",
      size: "341 MB",
      date: "2026-07-07",
      desc: "Video de la primera parte de Alya X Yuki. Contenido para adultos.",
      url: "https://drive.google.com/uc?export=download&id=1GSQvkZ8Zzg7PMz1aPC0-II1TFZezJ-yd"
    },
    {
      name: "[Totonito] Alya X Yuki Parte 2.mp4",
      folder: "Alya X Yuki", 
      category: "video",
      size: "212 MB",
      date: "2026-07-07",
      desc: "Video de la segunda parte de Alya X Yuki. Contenido para adultos.",
      url: "https://drive.google.com/uc?export=download&id=1GrHW5iw0cmKoJGRjyWJzvdKqyOEHjy4-"
    }
  ];

  const LAST_UPDATED = "07/07/2026";

  const foldersContainer = document.getElementById('folders-container');
  const empty = document.getElementById('empty');
  const searchInput = document.getElementById('search');
  const countLabel = document.getElementById('count-label');
  const filtersEl = document.getElementById('filters');
  document.getElementById('updated').textContent = LAST_UPDATED;

  let activeCategory = 'todos';

  function formatDate(iso){
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function isSameOrigin(url){
    try{
      const u = new URL(url, location.href);
      return u.origin === location.origin;
    }catch(e){ return false; }
  }

  function downloadFile(url, filename, button){
    const originalText = button.innerHTML;
    button.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> Procesando...';
    
    fetch(url).then(res => {
      if(!res.ok) throw new Error('Respuesta no válida');
      return res.blob();
    }).then(blob => {
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename || '';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(blobUrl);
      button.innerHTML = originalText;
    }).catch(err => {
      button.innerHTML = originalText;
      alert('Error al descargar: ' + err.message);
    });
  }

  function render(){
    const q = searchInput.value.trim().toLowerCase();
    
    // 1. Filtramos los archivos por búsqueda y categoría
    const filtered = FILES.filter(f => {
      const matchesQuery = f.name.toLowerCase().includes(q) || f.desc.toLowerCase().includes(q);
      const matchesCat = activeCategory === 'todos' || f.category === activeCategory;
      return matchesQuery && matchesCat;
    });

    countLabel.textContent = `${filtered.length} archivo${filtered.length === 1 ? '' : 's'} indexado${filtered.length === 1 ? '' : 's'}`;
    empty.hidden = filtered.length !== 0;
    foldersContainer.innerHTML = '';

    // 2. Agrupamos los archivos filtrados por su propiedad 'folder'
    const groupedFiles = {};
    filtered.forEach(f => {
      const folderName = f.folder || 'Archivos sin clasificar';
      if (!groupedFiles[folderName]) groupedFiles[folderName] = [];
      groupedFiles[folderName].push(f);
    });

    // 3. Renderizamos las carpetas y su contenido
    for (const [folderName, filesInFolder] of Object.entries(groupedFiles)) {
      
      const folderEl = document.createElement('div');
      // Si hay una búsqueda activa, o si solo hay 1 carpeta, la abrimos por defecto. 
      // De lo contrario la dejamos cerrada.
      const isOpen = q.length > 0 ? ' open' : '';
      folderEl.className = `folder${isOpen}`;

      // Crear el encabezado de la carpeta
      const headerEl = document.createElement('div');
      headerEl.className = 'folder-header';
      headerEl.innerHTML = `
        <div class="folder-title-group">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <span class="folder-title">${folderName}</span>
        </div>
        <div class="folder-meta">
          <span>${filesInFolder.length} archivo${filesInFolder.length === 1 ? '' : 's'}</span>
          <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      `;

      // Lógica para abrir/cerrar carpeta al hacer clic
      headerEl.addEventListener('click', () => {
        folderEl.classList.toggle('open');
      });

      // Crear el contenedor animado del acordeón
      const contentWrapper = document.createElement('div');
      contentWrapper.className = 'folder-content-wrapper';
      
      const contentInner = document.createElement('div');
      contentInner.className = 'folder-content-inner';

      // Crear el Grid real donde van las tarjetas
      const gridEl = document.createElement('div');
      gridEl.className = 'grid';

      // Rellenar la carpeta con sus archivos correspondientes
      filesInFolder.forEach((f, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        const stampClass = f.category === 'doc' ? 'stamp doc' : 'stamp';
        const stampLabel = f.category === 'doc' ? 'DOCUMENTO' : 'VIDEO';
        const sameOrigin = isSameOrigin(f.url);
        const previewHtml = (f.category === 'video' && sameOrigin) ? `<div class="preview"><video class="thumb" src="${f.url}" preload="metadata" muted playsinline></video></div>` : '';
        
        card.innerHTML = `
          <span class="${stampClass}" style="transform: rotate(${index % 2 === 0 ? 12 : -8}deg);">${stampLabel}</span>
          <h2>${f.name}</h2>
          <div class="meta">
            <span><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>${f.size}</span>
            <span><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>${formatDate(f.date)}</span>
          </div>
          <p class="desc">${f.desc}</p>
          ${previewHtml}
          <a class="btn-download" href="${f.url}" ${sameOrigin ? 'download' : 'target="_blank" rel="noopener"'}>
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            DESCARGAR
          </a>
        `;
        
        const btn = card.querySelector('.btn-download');
        if(btn && f.category === 'video' && sameOrigin){
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            downloadFile(f.url, f.name, btn);
          });
          const vid = card.querySelector('.thumb');
          if(vid){
            vid.addEventListener('mouseenter', () => { vid.play().catch(()=>{}); });
            vid.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });
          }
        }
        gridEl.appendChild(card);
      });

      // Ensamblar todo
      contentInner.appendChild(gridEl);
      contentWrapper.appendChild(contentInner);
      folderEl.appendChild(headerEl);
      folderEl.appendChild(contentWrapper);
      foldersContainer.appendChild(folderEl);
    }
  }

  function buildFilters(){
    const cats = ['todos', ...new Set(FILES.map(f => f.category))];
    const labels = { todos: 'Todo el archivo', video: 'Archivos de Video', doc: 'Documentos' };
    filtersEl.innerHTML = '';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
      btn.textContent = labels[cat] || cat;
      btn.addEventListener('click', () => {
        activeCategory = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
      filtersEl.appendChild(btn);
    });
  }

  searchInput.addEventListener('input', render);
  buildFilters();
  render();
</script>

</body>
</html>
